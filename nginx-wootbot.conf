# WootBot AI — Nginx reverse proxy
# Add this inside the existing Chatwoot server block (same domain, same SSL cert)
#
# Example: if Chatwoot runs at support.listen.doctor, add this location block
# inside that server {} block so WootBot is at support.listen.doctor/wootbot/
#
# Usage:
#   sudo cp nginx-wootbot.conf /etc/nginx/snippets/wootbot.conf
#   Then add inside your Chatwoot server block:
#     include snippets/wootbot.conf;
#   sudo nginx -t && sudo systemctl reload nginx

# Webhook — Chatwoot sends events here
# Configure bot URL as: https://support.listen.doctor/wootbot/webhook
location /wootbot/webhook {
    proxy_pass http://127.0.0.1:8200/webhook;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Only allow POST
    limit_except POST {
        deny all;
    }
}

# Admin panel + API — only accessible from Chatwoot iframe
location /wootbot/admin/ {
    proxy_pass http://127.0.0.1:8200/admin/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Health check
location = /wootbot/health {
    proxy_pass http://127.0.0.1:8200/health;
}
